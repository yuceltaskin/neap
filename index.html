    <!-- Proxy Hatasını Çözmek İçin Fetch Interceptor (Yönlendirici) -->
    <script>
      const originalFetch = window.fetch;
      window.fetch = async function() {
        let url = arguments[0];
        if (typeof url === 'string' && url.includes('corsproxy.io')) {
          arguments[0] = url.replace('https://corsproxy.io/?', 'https://api.allorigins.win/raw?url=');
        } else if (url instanceof Request && url.url.includes('corsproxy.io')) {
          arguments[0] = new Request(url.url.replace('https://corsproxy.io/?', 'https://api.allorigins.win/raw?url='), url);
        }
        return originalFetch.apply(this, arguments);
      };
    </script>
